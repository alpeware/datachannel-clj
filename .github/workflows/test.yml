name: Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Grant the GITHUB_TOKEN permission to interact with PRs
permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Clojure
      uses: DeLaGuardo/setup-clojure@13
      with:
        cli: 'latest'

    - name: Install native dependencies
      run: sudo apt-get update && sudo apt-get install -y libpulse0

    - name: Run tests
      run: clojure -J--add-exports=java.base/sun.security.tools.keytool=ALL-UNNAMED -J--add-exports=java.base/sun.security.x509=ALL-UNNAMED -M:test -m datachannel.test-runner

    - name: Auto-merge PR on Success
      # Only run this if tests pass AND it's a PR
      if: success() && github.event_name == 'pull_request'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Optional: You can wrap this in an IF statement to only auto-merge if the PR author is Jules
        gh pr merge ${{ github.event.pull_request.number }} --squash

    - name: Trigger next Jules task
      if: success() && github.event_name == 'pull_request'
      env:
        JULES_API_KEY: ${{ secrets.JULES_API_KEY }} 
      run: |
        curl -X POST "https://jules.googleapis.com/v1alpha/sessions" \
          -H "x-goog-api-key: ${JULES_API_KEY}" \
          -H "Content-Type: application/json" \
          -d '{
            "sourceContext": {
              "githubRepo": "alpeware/datachannel-clj"
            },
            "automationMode": "AUTO_CREATE_PR",
            "prompt": "Implement missing test cases from TESTING.md\n\n- Compare existing tests with the list of incomplete test cases\n- Pick one suitable new test\n- Implement it\n- Mark it as done"
          }'
